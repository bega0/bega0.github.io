name: Hexo Deploy

on:
  push:
    branches:
      - main # 确保你的源码是在 main 分支，如果你的分支叫 master 请改为 master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Deploy
        run: |
          git config --global user.name "Bega"
          git config --global user.email "你的GitHub邮箱"
          npx hexo clean
          npx hexo deploy
